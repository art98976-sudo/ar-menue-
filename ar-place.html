<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AR Food</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; overflow:hidden; font-family:-apple-system,sans-serif; }

        video {
            position:fixed; top:0; left:0;
            width:100vw; height:100vh;
            object-fit:cover; z-index:1;
        }
        canvas {
            position:fixed; top:0; left:0;
            width:100vw; height:100vh;
            z-index:2; background:transparent;
        }
        #back-btn {
            position:fixed; top:16px; left:16px; z-index:999;
            background:rgba(0,0,0,0.6); color:white; border:none;
            padding:9px 18px; border-radius:20px; font-size:14px; cursor:pointer;
        }
        #surface-msg {
            position:fixed; top:45%; left:50%;
            transform:translate(-50%,-50%);
            z-index:99; text-align:center; color:white;
            pointer-events:none;
        }
        #surface-msg h2 { font-size:18px; text-shadow:0 2px 8px rgba(0,0,0,0.9); }
        #surface-msg p  { font-size:13px; opacity:0.8; margin-top:6px; text-shadow:0 1px 4px rgba(0,0,0,0.9); }

        #reticle {
            position:fixed; bottom:38%; left:50%;
            transform:translateX(-50%);
            z-index:99; pointer-events:none;
            display:none; flex-direction:column;
            align-items:center; gap:12px;
        }
        #reticle-ring {
            width:76px; height:76px;
            border:2.5px solid #d4a574;
            border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            animation:pulse 1.5s ease-in-out infinite;
            box-shadow:0 0 24px rgba(212,165,116,0.5);
        }
        #reticle-dot { width:10px; height:10px; background:#d4a574; border-radius:50%; }
        #tap-label {
            color:white; font-size:14px; font-weight:600;
            background:rgba(0,0,0,0.65); padding:8px 20px; border-radius:24px;
        }
        @keyframes pulse {
            0%,100%{transform:scale(1);opacity:1;}
            50%{transform:scale(1.08);opacity:0.7;}
        }
        #toast {
            position:fixed; top:72px; left:50%;
            transform:translateX(-50%);
            z-index:999; background:rgba(0,0,0,0.7);
            color:white; padding:9px 22px;
            border-radius:20px; font-size:13px;
            display:none; white-space:nowrap;
        }
        #controls {
            position:fixed; bottom:24px; left:50%;
            transform:translateX(-50%);
            z-index:99; display:none;
            flex-direction:column; align-items:center; gap:8px;
        }
        #ctrl-hint { color:rgba(255,255,255,0.75); font-size:11px; }
        .ctrl-btn {
            background:rgba(0,0,0,0.6); color:white;
            border:1px solid rgba(255,255,255,0.3);
            padding:9px 20px; border-radius:20px;
            font-size:13px; cursor:pointer;
        }
        .food-label {
            position:fixed; z-index:99;
            color:white; font-size:12px; font-weight:500;
            background:rgba(0,0,0,0.55);
            padding:5px 12px; border-radius:12px;
            pointer-events:none; display:none;
            border:1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

<!-- Camera video — first element, behind everything -->
<video id="cam" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<button id="back-btn" onclick="window.history.back()">← Back</button>

<div id="surface-msg">
    <h2>📱 Move phone over table</h2>
    <p>Detecting flat surface...</p>
</div>

<div id="reticle">
    <div id="reticle-ring"><div id="reticle-dot"></div></div>
    <div id="tap-label">TAP TO PLACE</div>
</div>

<div id="toast"></div>

<div class="food-label" id="label1"></div>
<div class="food-label" id="label2"></div>
<div class="food-label" id="label3"></div>

<div id="controls">
    <div id="ctrl-hint">☝️ Drag to rotate &nbsp;·&nbsp; 🤏 Pinch to zoom</div>
    <div style="display:flex;gap:10px">
        <button class="ctrl-btn" onclick="resetPlace()">🔄 Replace</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/DRACOLoader.js"></script>
<script>

// ── STEP 1: START CAMERA FIRST — before anything else ──
const video = document.getElementById('cam');
navigator.mediaDevices.getUserMedia({
    video: { facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }
}).then(stream => {
    video.srcObject = stream;
}).catch(() => {
    navigator.mediaDevices.getUserMedia({ video:true }).then(stream => {
        video.srcObject = stream;
    }).catch(err => {
        showToast('❌ Camera error: ' + err.message);
    });
});

// ── Config ──
const params = new URLSearchParams(window.location.search);
const modelId = params.get('model') || 'pizza';
const modelSrc = {
    pizza:'./pizza.glb', burger:'./burger.glb',
    drink:'./drink.glb', pasta:'./pasta.glb', sushi:'./sushi.glb'
};
const modelSizes = { pizza:0.25, burger:0.12, drink:0.09, pasta:0.22, sushi:0.20 };
const foodLabels = {
    pizza:  ['🍅 Tomato', '🧀 Mozzarella', '🌿 Basil'],
    burger: ['🥩 Beef Patty', '🧀 Cheddar', '🥬 Lettuce'],
    drink:  ['🍋 Lemon', '🌿 Mint', '🍯 Honey'],
    pasta:  ['🧄 Garlic', '🌿 Herbs', '🧀 Parmesan'],
    sushi:  ['🐟 Salmon', '🍚 Rice', '🥒 Cucumber']
};

// ── State ──
let placed = false;
let surfaceDetected = false;
let model = null;
let currentScale = 1.0;
let rotY = 0;
let steamParticles = null, steamAnimId = null;

// ── Three.js ──
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.01, 100);
camera.position.set(0, 0.6, 1.8);
camera.lookAt(0, 0, 0);

// Lighting
scene.add(new THREE.HemisphereLight(0xfff5e0, 0x443322, 1.0));
const kl = new THREE.DirectionalLight(0xFFD8B0, 1.8);
kl.position.set(-3, 6, 4); kl.castShadow = true;
kl.shadow.mapSize.width = 2048; kl.shadow.mapSize.height = 2048;
kl.shadow.radius = 12; kl.shadow.bias = -0.0005;
scene.add(kl);
const fl2 = new THREE.DirectionalLight(0xffe8d5, 0.5);
fl2.position.set(4, 3, -2); scene.add(fl2);
const rl2 = new THREE.DirectionalLight(0xfff0e8, 0.6);
rl2.position.set(0, 4, -6); scene.add(rl2);

// Shadow
const shadowPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(2,2),
    new THREE.ShadowMaterial({ opacity:0.4 })
);
shadowPlane.rotation.x = -Math.PI/2;
shadowPlane.receiveShadow = true;
shadowPlane.visible = false;
scene.add(shadowPlane);

const s1 = new THREE.Mesh(
    new THREE.CircleGeometry(0.20,32),
    new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:0.2, depthWrite:false })
);
s1.rotation.x = -Math.PI/2; s1.position.y = 0.001; s1.visible = false;
scene.add(s1);

const s2 = new THREE.Mesh(
    new THREE.CircleGeometry(0.12,32),
    new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:0.32, depthWrite:false })
);
s2.rotation.x = -Math.PI/2; s2.position.y = 0.002; s2.visible = false;
scene.add(s2);

// Load model
const loader = new THREE.GLTFLoader();
const draco = new THREE.DRACOLoader();
draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
draco.setDecoderConfig({ type:'js' });
loader.setDRACOLoader(draco);

loader.load(modelSrc[modelId], gltf => {
    model = gltf.scene;
    model.traverse(c => {
        if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; }
    });

    // Real size
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const s = modelSizes[modelId] / Math.max(size.x, size.y, size.z);
    model.scale.setScalar(s);
    currentScale = s;

    // Fix pivot to bottom — no floating
    model.updateMatrixWorld(true);
    const box2 = new THREE.Box3().setFromObject(model);
    const center = box2.getCenter(new THREE.Vector3());
    model.position.set(-center.x, -box2.min.y, -center.z);
    model.rotation.set(0, 0, 0);
    model.visible = false;
    scene.add(model);

    // Start surface detection after model loaded
    startSurfaceDetection();

}, null, err => console.error('Model error:', err));

// Render loop
function renderLoop() {
    requestAnimationFrame(renderLoop);
    renderer.render(scene, camera);
}
renderLoop();

// Surface detection
function startSurfaceDetection() {
    document.getElementById('surface-msg').style.display = 'block';
    setTimeout(() => {
        surfaceDetected = true;
        document.getElementById('surface-msg').style.display = 'none';
        document.getElementById('reticle').style.display = 'flex';
        showToast('✅ Surface detected! Tap to place food');
    }, 2000);
}

// Place model
function placeModel() {
    if (!model || !surfaceDetected || placed) return;
    placed = true;
    model.visible = true;
    shadowPlane.visible = true;
    s1.visible = true;
    s2.visible = true;
    if (modelId !== 'drink') addSteam();
    showLabels();
    document.getElementById('reticle').style.display = 'none';
    document.getElementById('controls').style.display = 'flex';
    showToast('🍽️ Drag to rotate · Pinch to zoom');
}

function resetPlace() {
    placed = false; surfaceDetected = false;
    if (model) model.visible = false;
    shadowPlane.visible = false; s1.visible = false; s2.visible = false;
    if (steamParticles) { scene.remove(steamParticles); steamParticles = null; }
    if (steamAnimId) { cancelAnimationFrame(steamAnimId); steamAnimId = null; }
    rotY = 0;
    hideLabels();
    document.getElementById('reticle').style.display = 'none';
    document.getElementById('controls').style.display = 'none';
    startSurfaceDetection();
}

// Floating labels
function showLabels() {
    const labels = foodLabels[modelId];
    const pos = [
        {left:'12%', top:'28%'},
        {left:'62%', top:'22%'},
        {left:'68%', top:'52%'}
    ];
    labels.forEach((txt, i) => {
        const el = document.getElementById(`label${i+1}`);
        el.innerText = txt; el.style.left = pos[i].left;
        el.style.top = pos[i].top; el.style.display = 'block';
    });
}
function hideLabels() {
    [1,2,3].forEach(i => document.getElementById(`label${i}`).style.display='none');
}

// Steam
function addSteam() {
    const count = 20;
    const pos = new Float32Array(count*3);
    const speeds = new Float32Array(count);
    const offsets = new Float32Array(count);
    for (let i=0; i<count; i++) {
        pos[i*3]=(Math.random()-0.5)*0.12; pos[i*3+1]=Math.random()*0.2;
        pos[i*3+2]=(Math.random()-0.5)*0.12;
        speeds[i]=0.003+Math.random()*0.004; offsets[i]=Math.random()*Math.PI*2;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
    const mat = new THREE.PointsMaterial({
        color:0xeeeeee, size:0.035, transparent:true,
        opacity:0.3, depthWrite:false, blending:THREE.AdditiveBlending
    });
    steamParticles = new THREE.Points(geo, mat);
    steamParticles.position.y = 0.1;
    scene.add(steamParticles);
    let frame = 0;
    function anim() {
        steamAnimId = requestAnimationFrame(anim);
        if (!steamParticles) return;
        frame++;
        const p = steamParticles.geometry.attributes.position;
        for (let i=0; i<count; i++) {
            p.array[i*3+1] += speeds[i];
            p.array[i*3] += Math.sin(frame*0.02+offsets[i])*0.001;
            if (p.array[i*3+1] > 0.45) {
                p.array[i*3]=(Math.random()-0.5)*0.12; p.array[i*3+1]=0;
            }
        }
        p.needsUpdate = true;
        mat.opacity = 0.2+Math.sin(frame*0.04)*0.1;
    }
    anim();
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.style.display = 'block';
    clearTimeout(t._t);
    t._t = setTimeout(()=>t.style.display='none', 3000);
}

// Touch controls
let lastX=null, lastPinch=null;
canvas.addEventListener('touchstart', e=>{
    if (!placed){placeModel();return;}
    if (e.touches.length===1){lastX=e.touches[0].clientX;lastPinch=null;}
    else if (e.touches.length===2){
        lastPinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
        lastX=null;
    }
},{passive:true});

canvas.addEventListener('touchmove', e=>{
    if (!model||!placed) return;
    if (e.touches.length===1&&lastX!==null){
        rotY+=(e.touches[0].clientX-lastX)*0.012;
        model.rotation.y=rotY; lastX=e.touches[0].clientX;
    } else if (e.touches.length===2&&lastPinch!==null){
        const nd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
        currentScale=Math.max(0.3,Math.min(5,currentScale*(1+(nd-lastPinch)/lastPinch*0.5)));
        model.scale.setScalar(currentScale);
        const sc=currentScale/modelSizes[modelId];
        s1.scale.setScalar(sc); s2.scale.setScalar(sc);
        lastPinch=nd;
    }
},{passive:true});

canvas.addEventListener('touchend',()=>{lastX=null;lastPinch=null;});
canvas.addEventListener('click',()=>{if(!placed)placeModel();});

window.addEventListener('resize',()=>{
    renderer.setSize(window.innerWidth,window.innerHeight);
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
});
</script>
</body>
</html>
