<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AR Food</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; overflow:hidden; font-family:-apple-system,sans-serif; }

        /* Stage 1: Surface detection overlay */
        #surface-msg {
            position:fixed; top:50%; left:50%;
            transform:translate(-50%,-50%);
            z-index:999; text-align:center;
            color:white; pointer-events:none;
        }
        #surface-msg h2 { font-size:18px; margin-bottom:8px; text-shadow:0 2px 8px rgba(0,0,0,0.8); }
        #surface-msg p { font-size:13px; opacity:0.8; text-shadow:0 1px 4px rgba(0,0,0,0.8); }

        /* Stage 1: Surface grid dots */
        #grid-canvas {
            position:fixed; top:0; left:0;
            width:100vw; height:100vh;
            z-index:3; pointer-events:none;
            opacity:0; transition:opacity 0.5s;
        }

        /* Stage 2: Tap to place */
        #reticle {
            position:fixed; bottom:38%; left:50%;
            transform:translateX(-50%);
            z-index:99; pointer-events:none;
            display:none; flex-direction:column;
            align-items:center; gap:12px;
        }
        #reticle-outer {
            width:76px; height:76px;
            border:2px solid rgba(255,255,255,0.9);
            border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            animation:pulse 1.5s ease-in-out infinite;
            box-shadow:0 0 24px rgba(255,255,255,0.3);
        }
        #reticle-inner { width:8px; height:8px; background:white; border-radius:50%; }
        #tap-label {
            color:white; font-size:14px; font-weight:600;
            background:rgba(0,0,0,0.6); padding:8px 20px; border-radius:24px;
            letter-spacing:0.3px;
        }
        @keyframes pulse {
            0%,100%{transform:scale(1);opacity:1;}
            50%{transform:scale(1.08);opacity:0.8;}
        }

        /* Back button */
        #back-btn {
            position:fixed; top:16px; left:16px; z-index:9999;
            background:rgba(0,0,0,0.55); color:white; border:none;
            padding:9px 18px; border-radius:20px; font-size:14px; cursor:pointer;
            backdrop-filter:blur(10px);
        }

        /* Stage 10: Controls */
        #controls {
            position:fixed; bottom:24px; left:50%;
            transform:translateX(-50%);
            z-index:999; display:none;
            flex-direction:column; align-items:center; gap:8px;
        }
        #ctrl-hint {
            color:rgba(255,255,255,0.75); font-size:11px;
            background:rgba(0,0,0,0.4); padding:5px 14px; border-radius:12px;
        }
        #ctrl-btns { display:flex; gap:10px; }
        .ctrl-btn {
            background:rgba(0,0,0,0.55); color:white;
            border:1px solid rgba(255,255,255,0.25);
            padding:9px 20px; border-radius:20px;
            font-size:12px; cursor:pointer;
            backdrop-filter:blur(10px);
        }

        /* Toast */
        #toast {
            position:fixed; top:72px; left:50%;
            transform:translateX(-50%);
            z-index:9999; background:rgba(0,0,0,0.7);
            color:white; padding:9px 22px;
            border-radius:20px; font-size:13px;
            display:none; white-space:nowrap;
            backdrop-filter:blur(10px);
        }

        /* Floating ingredient labels (like in video) */
        .food-label {
            position:fixed; z-index:998;
            color:white; font-size:12px; font-weight:500;
            background:rgba(0,0,0,0.5);
            padding:4px 10px; border-radius:10px;
            pointer-events:none; display:none;
            backdrop-filter:blur(6px);
            border:1px solid rgba(255,255,255,0.2);
        }

        /* Loading */
        #loading {
            position:fixed; inset:0; z-index:9999;
            background:#000;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            color:white; gap:14px; font-size:15px;
        }
        .spinner {
            width:44px; height:44px;
            border:3px solid rgba(255,255,255,0.15);
            border-top-color:#d4a574;
            border-radius:50%;
            animation:spin 1s linear infinite;
        }
        @keyframes spin{to{transform:rotate(360deg);}}
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <div id="load-txt">Loading...</div>
</div>

<div id="surface-msg">
    <h2>📱 Move phone over table</h2>
    <p>Detecting flat surface...</p>
</div>

<canvas id="grid-canvas"></canvas>

<div id="reticle">
    <div id="reticle-outer"><div id="reticle-inner"></div></div>
    <div id="tap-label">TAP TO PLACE</div>
</div>

<button id="back-btn" onclick="window.history.back()">← Back</button>
<div id="toast"></div>

<!-- Floating ingredient labels -->
<div class="food-label" id="label1"></div>
<div class="food-label" id="label2"></div>
<div class="food-label" id="label3"></div>

<div id="controls">
    <div id="ctrl-hint">☝️ Rotate &nbsp;·&nbsp; 🤏 Zoom</div>
    <div id="ctrl-btns">
        <button class="ctrl-btn" onclick="resetPlace()">🔄 Replace</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/DRACOLoader.js"></script>
<script>
// ── Config ──
const params = new URLSearchParams(window.location.search);
const modelId = params.get('model') || 'pizza';

const modelSrc = {
    pizza:'./pizza.glb', burger:'./burger.glb',
    drink:'./drink.glb', pasta:'./pasta.glb', sushi:'./sushi.glb'
};

// Stage 4: Real world sizes
const modelSizes = { pizza:0.25, burger:0.12, drink:0.09, pasta:0.22, sushi:0.20 };

// Food labels (like in the video)
const foodLabels = {
    pizza:  ['🍅 Tomato', '🧀 Mozzarella', '🌿 Basil'],
    burger: ['🥩 Beef Patty', '🧀 Cheddar', '🥬 Lettuce'],
    drink:  ['🍋 Lemon', '🌿 Mint', '🍯 Honey'],
    pasta:  ['🧄 Garlic', '🌿 Herbs', '🧀 Parmesan'],
    sushi:  ['🐟 Salmon', '🍚 Rice', '🥒 Cucumber']
};

// ── State ──
let placed = false;       // Stage 3: lock
let surfaceDetected = false;
let model = null;
let currentScale = 1.0;
let rotY = 0;
let steamParticles = null, steamAnimId = null;

// ── Three.js ──
const canvas = document.createElement('canvas');
canvas.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:4;background:transparent;';
document.body.appendChild(canvas);

const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
// Stage 11: Environment blending
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.01, 100);
camera.position.set(0, 0.6, 1.8);
camera.lookAt(0, 0, 0);

// Stage 6: Premium lighting
scene.add(new THREE.HemisphereLight(0xfff5e0, 0x443322, 1.0));
const keyLight = new THREE.DirectionalLight(0xFFD8B0, 1.8);
keyLight.position.set(-3, 6, 4);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 2048;
keyLight.shadow.mapSize.height = 2048;
keyLight.shadow.radius = 12;
keyLight.shadow.bias = -0.0005;
scene.add(keyLight);
scene.add(Object.assign(new THREE.DirectionalLight(0xffe8d5, 0.5), {position:{x:4,y:3,z:-2, set(){return this;}}.set&&{x:4,y:3,z:-2}}));
const fl = new THREE.DirectionalLight(0xffe8d5, 0.5);
fl.position.set(4, 3, -2); scene.add(fl);
const rl = new THREE.DirectionalLight(0xfff0e8, 0.6);
rl.position.set(0, 4, -6); scene.add(rl);

// Stage 5: Shadow plane
const shadowPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(2, 2),
    new THREE.ShadowMaterial({ opacity:0.4 })
);
shadowPlane.rotation.x = -Math.PI/2;
shadowPlane.receiveShadow = true;
shadowPlane.visible = false;
scene.add(shadowPlane);

const softShadow1 = new THREE.Mesh(
    new THREE.CircleGeometry(0.20, 32),
    new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:0.18, depthWrite:false })
);
softShadow1.rotation.x = -Math.PI/2;
softShadow1.position.y = 0.001;
softShadow1.visible = false;
scene.add(softShadow1);

const softShadow2 = new THREE.Mesh(
    new THREE.CircleGeometry(0.12, 32),
    new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:0.32, depthWrite:false })
);
softShadow2.rotation.x = -Math.PI/2;
softShadow2.position.y = 0.002;
softShadow2.visible = false;
scene.add(softShadow2);

// ── Load model ──
const loader = new THREE.GLTFLoader();
const draco = new THREE.DRACOLoader();
draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
draco.setDecoderConfig({ type:'js' });
loader.setDRACOLoader(draco);

document.getElementById('load-txt').innerText = 'Loading model...';

loader.load(modelSrc[modelId], gltf => {
    model = gltf.scene;
    model.traverse(c => {
        if (c.isMesh) {
            c.castShadow = true;
            c.receiveShadow = true;
            // Stage 9: Improve material quality
            if (c.material) {
                if (c.material.roughness !== undefined) c.material.roughness = Math.max(0.3, c.material.roughness);
                if (c.material.metalness !== undefined) c.material.metalness = Math.min(0.2, c.material.metalness);
                c.material.needsUpdate = true;
            }
        }
    });

    // Stage 4: Real size
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const s = modelSizes[modelId] / Math.max(size.x, size.y, size.z);
    model.scale.setScalar(s);
    currentScale = s;

    // Stage 5+7: Fix pivot to bottom, align with surface
    model.updateMatrixWorld(true);
    const box2 = new THREE.Box3().setFromObject(model);
    const center = box2.getCenter(new THREE.Vector3());
    model.position.set(-center.x, -box2.min.y, -center.z);

    // Stage 10: Straight rotation
    model.rotation.set(0, 0, 0);
    model.visible = false;
    scene.add(model);

    document.getElementById('loading').style.display = 'none';
    startSurfaceDetection();

}, xhr => {
    const pct = Math.round(xhr.loaded/xhr.total*100);
    document.getElementById('load-txt').innerText = `Loading... ${pct}%`;
}, err => {
    document.getElementById('load-txt').innerText = 'Failed to load';
});

// ── Camera ──
async function startCamera() {
    const video = document.createElement('video');
    video.autoplay = true; video.playsInline = true; video.muted = true;
    video.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover;z-index:1;';
    document.body.appendChild(video);
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }
        });
        video.srcObject = stream;
    } catch(e) {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video:true });
            video.srcObject = s;
        } catch(e2) { showToast('Camera error'); }
    }
}
startCamera();

// ── Animate ──
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();

// ── Stage 1: Surface detection with grid animation ──
function startSurfaceDetection() {
    const gridCanvas = document.getElementById('grid-canvas');
    const ctx = gridCanvas.getContext('2d');
    gridCanvas.width = window.innerWidth;
    gridCanvas.height = window.innerHeight;

    let dots = [];
    let detecting = true;
    let dotTimer = 0;

    // Create grid dots
    for (let i = 0; i < 30; i++) {
        dots.push({
            x: Math.random() * window.innerWidth,
            y: window.innerHeight * 0.4 + Math.random() * window.innerHeight * 0.4,
            size: Math.random() * 3 + 1,
            opacity: 0,
            delay: Math.random() * 2000
        });
    }

    function drawDots(timestamp) {
        if (!detecting) return;
        ctx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
        dots.forEach(dot => {
            if (timestamp > dot.delay) {
                dot.opacity = Math.min(dot.opacity + 0.02, 0.7);
            }
            ctx.beginPath();
            ctx.arc(dot.x, dot.y, dot.size, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255,255,255,${dot.opacity})`;
            ctx.fill();
        });
        requestAnimationFrame(drawDots);
    }
    requestAnimationFrame(drawDots);
    gridCanvas.style.opacity = '1';

    // Stage 2: After 2.5s show tap instruction
    setTimeout(() => {
        detecting = false;
        surfaceDetected = true;
        gridCanvas.style.opacity = '0';
        document.getElementById('surface-msg').style.display = 'none';
        document.getElementById('reticle').style.display = 'flex';
        showToast('✅ Surface found! Tap to place food');
    }, 2500);
}

// ── Stage 3+4: Place and LOCK ──
function placeModel() {
    if (!model || !surfaceDetected || placed) return;
    placed = true; // Stage 4: locked forever

    model.visible = true;
    shadowPlane.visible = true;
    softShadow1.visible = true;
    softShadow2.visible = true;

    // Stage 9: Steam
    if (modelId !== 'drink') addSteam();

    // Stage 11: Show ingredient labels
    showLabels();

    document.getElementById('reticle').style.display = 'none';
    document.getElementById('controls').style.display = 'flex';
    showToast('🍽️ Tap · Drag to rotate · Pinch to zoom');
}

// Stage 11: Floating ingredient labels like in video
function showLabels() {
    const labels = foodLabels[modelId];
    const positions = [
        { left:'15%', top:'30%' },
        { left:'65%', top:'25%' },
        { left:'70%', top:'55%' }
    ];
    labels.forEach((text, i) => {
        const el = document.getElementById(`label${i+1}`);
        el.innerText = text;
        el.style.left = positions[i].left;
        el.style.top = positions[i].top;
        el.style.display = 'block';
        el.style.animation = `float${i} 3s ease-in-out infinite`;
    });
}

function hideLabels() {
    [1,2,3].forEach(i => {
        document.getElementById(`label${i}`).style.display = 'none';
    });
}

function resetPlace() {
    placed = false;
    surfaceDetected = false;
    if (model) model.visible = false;
    shadowPlane.visible = false;
    softShadow1.visible = false;
    softShadow2.visible = false;
    if (steamParticles) { scene.remove(steamParticles); steamParticles = null; }
    if (steamAnimId) { cancelAnimationFrame(steamAnimId); steamAnimId = null; }
    rotY = 0;
    hideLabels();
    document.getElementById('reticle').style.display = 'none';
    document.getElementById('controls').style.display = 'none';
    document.getElementById('surface-msg').style.display = 'block';
    startSurfaceDetection();
}

// Stage 9: Steam
function addSteam() {
    const count = 20;
    const pos = new Float32Array(count*3);
    const speeds = new Float32Array(count);
    const offsets = new Float32Array(count);
    for (let i=0; i<count; i++) {
        pos[i*3]   = (Math.random()-0.5)*0.12;
        pos[i*3+1] = Math.random()*0.2;
        pos[i*3+2] = (Math.random()-0.5)*0.12;
        speeds[i]  = 0.003 + Math.random()*0.004;
        offsets[i] = Math.random()*Math.PI*2;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({
        color:0xeeeeee, size:0.035, transparent:true,
        opacity:0.3, depthWrite:false, blending:THREE.AdditiveBlending
    });
    steamParticles = new THREE.Points(geo, mat);
    steamParticles.position.y = 0.1;
    scene.add(steamParticles);
    let frame = 0;
    function anim() {
        steamAnimId = requestAnimationFrame(anim);
        if (!steamParticles) return;
        frame++;
        const p = steamParticles.geometry.attributes.position;
        for (let i=0; i<count; i++) {
            p.array[i*3+1] += speeds[i];
            p.array[i*3]   += Math.sin(frame*0.02+offsets[i])*0.001;
            if (p.array[i*3+1] > 0.45) {
                p.array[i*3]   = (Math.random()-0.5)*0.12;
                p.array[i*3+1] = 0;
            }
        }
        p.needsUpdate = true;
        mat.opacity = 0.2 + Math.sin(frame*0.04)*0.1;
    }
    anim();
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.style.display = 'block';
    clearTimeout(t._t);
    t._t = setTimeout(() => t.style.display = 'none', 3000);
}

// ── Stage 10+12: Touch controls ──
let lastX = null, lastPinch = null;

canvas.addEventListener('touchstart', e => {
    if (!placed) { placeModel(); return; }
    if (e.touches.length === 1) { lastX = e.touches[0].clientX; lastPinch = null; }
    else if (e.touches.length === 2) {
        lastPinch = Math.hypot(
            e.touches[0].clientX-e.touches[1].clientX,
            e.touches[0].clientY-e.touches[1].clientY
        );
        lastX = null;
    }
}, { passive:true });

canvas.addEventListener('touchmove', e => {
    if (!model || !placed) return;
    if (e.touches.length === 1 && lastX !== null) {
        rotY += (e.touches[0].clientX - lastX) * 0.012;
        model.rotation.y = rotY;
        lastX = e.touches[0].clientX;
    } else if (e.touches.length === 2 && lastPinch !== null) {
        const nd = Math.hypot(
            e.touches[0].clientX-e.touches[1].clientX,
            e.touches[0].clientY-e.touches[1].clientY
        );
        currentScale = Math.max(0.3, Math.min(5, currentScale*(1+(nd-lastPinch)/lastPinch*0.5)));
        model.scale.setScalar(currentScale);
        const s = currentScale / modelSizes[modelId];
        softShadow1.scale.setScalar(s);
        softShadow2.scale.setScalar(s);
        lastPinch = nd;
    }
}, { passive:true });

canvas.addEventListener('touchend', () => { lastX = null; lastPinch = null; });
canvas.addEventListener('click', () => { if (!placed) placeModel(); });

let mouseDown = false, lastMX = null;
canvas.addEventListener('mousedown', e => { if (placed) { mouseDown=true; lastMX=e.clientX; } });
canvas.addEventListener('mousemove', e => {
    if (!mouseDown || !model) return;
    rotY += (e.clientX-lastMX)*0.012;
    model.rotation.y = rotY;
    lastMX = e.clientX;
});
canvas.addEventListener('mouseup', () => mouseDown = false);
canvas.addEventListener('wheel', e => {
    if (!model || !placed) return;
    currentScale = Math.max(0.3, Math.min(5, currentScale - e.deltaY*0.001));
    model.scale.setScalar(currentScale);
});

window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
});
</script>
</body>
</html>
