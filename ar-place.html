<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AR Place</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; overflow:hidden; font-family:-apple-system,sans-serif; }

        #top-bar {
            position:fixed; top:0; left:0; right:0; z-index:999;
            display:flex; justify-content:space-between; align-items:center;
            padding:14px 16px;
            background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);
        }
        #back-btn {
            background:rgba(0,0,0,0.6); color:white; border:none;
            padding:8px 16px; border-radius:20px; font-size:14px; cursor:pointer;
        }
        #food-title { color:white; font-size:16px; font-weight:bold; }

        #status {
            position:fixed; top:80px; left:50%; transform:translateX(-50%);
            z-index:999; background:rgba(0,0,0,0.75);
            color:white; padding:10px 22px;
            border-radius:20px; font-size:13px;
            text-align:center; white-space:nowrap;
            pointer-events:none;
        }

        #controls {
            position:fixed; bottom:0; left:0; right:0; z-index:999;
            padding:16px;
            background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
            display:none; flex-direction:column;
            align-items:center; gap:10px;
        }
        #ctrl-hint { color:rgba(255,255,255,0.8); font-size:12px; }
        .ctrl-btn {
            background:rgba(255,255,255,0.15); color:white;
            border:1.5px solid rgba(255,255,255,0.3);
            padding:10px 20px; border-radius:20px;
            font-size:13px; cursor:pointer;
        }

        #loading {
            position:fixed; inset:0; z-index:9999;
            background:#000;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            color:white; gap:14px; font-size:16px;
        }
        .spinner {
            width:44px; height:44px;
            border:3px solid rgba(255,255,255,0.2);
            border-top-color:#d4a574;
            border-radius:50%;
            animation:spin 1s linear infinite;
        }
        @keyframes spin { to{transform:rotate(360deg);} }

        #no-webxr {
            position:fixed; inset:0; z-index:9999;
            background:#111;
            display:none; flex-direction:column;
            align-items:center; justify-content:center;
            color:white; gap:16px; padding:32px; text-align:center;
        }
        #no-webxr h2 { color:#d4a574; font-size:20px; }
        #no-webxr p { color:#aaa; font-size:14px; line-height:1.6; }
        #no-webxr button {
            background:#d4a574; color:white; border:none;
            padding:12px 28px; border-radius:20px;
            font-size:15px; cursor:pointer; margin-top:8px;
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <div id="load-text">Loading model...</div>
</div>

<div id="no-webxr">
    <h2>📱 AR Not Supported</h2>
    <p>Your browser doesn't support WebXR AR.<br><br>
    Please use:<br>
    <strong>Android → Chrome browser</strong><br>
    <strong>iPhone → Safari 16+</strong></p>
    <button onclick="window.history.back()">← Go Back</button>
</div>

<div id="top-bar">
    <button id="back-btn" onclick="exitAR()">← Back</button>
    <div id="food-title">Loading...</div>
    <div style="width:70px"></div>
</div>

<div id="status">📱 Detecting surfaces...</div>

<div id="controls">
    <div id="ctrl-hint">☝️ Drag to rotate · 🤏 Pinch to zoom</div>
    <div style="display:flex;gap:10px;">
        <button class="ctrl-btn" onclick="resetPlacement()">🔄 Replace</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/DRACOLoader.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const modelId = params.get('model') || 'pizza';
const modelSrc = {
    pizza:'./pizza.glb', burger:'./burger.glb',
    drink:'./drink.glb', pasta:'./pasta.glb', sushi:'./sushi.glb'
};
const modelNames = {
    pizza:'Margherita Pizza 🍕', burger:'Classic Burger 🍔',
    drink:'Fresh Lemonade 🥤', pasta:'Creamy Pasta 🍝', sushi:'Sushi Platter 🍣'
};

document.getElementById('food-title').innerText = modelNames[modelId];

// ── Three.js setup ──
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true; // STEP 1: Enable WebXR
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);

// Premium lighting
scene.add(new THREE.HemisphereLight(0xfff5e0, 0x443322, 1.0));
const key = new THREE.DirectionalLight(0xFFD8B0, 1.8);
key.position.set(-3, 6, 4);
key.castShadow = true;
key.shadow.mapSize.width = 2048;
key.shadow.mapSize.height = 2048;
key.shadow.radius = 12;
key.shadow.bias = -0.0005;
scene.add(key);
const fill = new THREE.DirectionalLight(0xffe8d5, 0.5);
fill.position.set(4, 3, -2);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xfff0e8, 0.6);
rim.position.set(0, 4, -6);
scene.add(rim);

// STEP 3: Reticle — shows where surface is detected
const reticleGeo = new THREE.RingGeometry(0.08, 0.12, 32);
const reticleMat = new THREE.MeshBasicMaterial({ color:0xd4a574, side:THREE.DoubleSide });
const reticle = new THREE.Mesh(reticleGeo, reticleMat);
reticle.rotation.x = -Math.PI / 2;
reticle.visible = false;
scene.add(reticle);

// Inner reticle dot
const dotGeo = new THREE.CircleGeometry(0.02, 16);
const dotMat = new THREE.MeshBasicMaterial({ color:0xd4a574 });
const dot = new THREE.Mesh(dotGeo, dotMat);
dot.rotation.x = -Math.PI / 2;
dot.position.y = 0.001;
dot.visible = false;
scene.add(dot);

// STEP 6: Shadow plane under model
const shadowGeo = new THREE.PlaneGeometry(1, 1);
const shadowMat = new THREE.ShadowMaterial({ opacity:0.4 });
const shadowPlane = new THREE.Mesh(shadowGeo, shadowMat);
shadowPlane.receiveShadow = true;
shadowPlane.visible = false;
scene.add(shadowPlane);

// Soft contact shadow (double layer)
const softShadow1 = new THREE.Mesh(
    new THREE.CircleGeometry(0.22, 32),
    new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:0.2, depthWrite:false })
);
softShadow1.rotation.x = -Math.PI/2;
softShadow1.visible = false;
scene.add(softShadow1);

const softShadow2 = new THREE.Mesh(
    new THREE.CircleGeometry(0.14, 32),
    new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:0.3, depthWrite:false })
);
softShadow2.rotation.x = -Math.PI/2;
softShadow2.visible = false;
scene.add(softShadow2);

// Load model
let model = null;
let placed = false;
let currentScale = 1.0;
let rotY = 0;

const loader = new THREE.GLTFLoader();
const draco = new THREE.DRACOLoader();
draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
draco.setDecoderConfig({ type:'js' });
loader.setDRACOLoader(draco);

loader.load(modelSrc[modelId], gltf => {
    model = gltf.scene;
    model.traverse(c => {
        if(c.isMesh){ c.castShadow=true; c.receiveShadow=true; }
    });

    // STEP 5: Real world scale
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const targetSize = 0.25; // 25cm real plate size
    const s = targetSize / maxDim;
    model.scale.setScalar(s);

    // STEP 2+3: Fix pivot to bottom center — stops floating
    model.updateMatrixWorld(true);
    const box2 = new THREE.Box3().setFromObject(model);
    const center = box2.getCenter(new THREE.Vector3());
    model.position.set(-center.x, -box2.min.y, -center.z);

    model.visible = false;
    scene.add(model);
    document.getElementById('loading').style.display = 'none';

}, null, err => {
    console.error(err);
    document.getElementById('load-text').innerText = 'Failed to load model';
});

// STEP 1: Start WebXR hit-test session
let xrSession = null;
let hitTestSource = null;
let hitTestSourceRequested = false;
let xrRefSpace = null;

async function startAR() {
    if (!navigator.xr) {
        showNoWebXR();
        return;
    }

    const supported = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
    if (!supported) {
        showNoWebXR();
        return;
    }

    // Request AR session with hit-test
    xrSession = await navigator.xr.requestSession('immersive-ar', {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['dom-overlay'],
        domOverlay: { root: document.body }
    });

    renderer.xr.setReferenceSpaceType('local');
    await renderer.xr.setSession(xrSession);

    xrSession.addEventListener('end', () => {
        xrSession = null;
        hitTestSource = null;
        hitTestSourceRequested = false;
    });

    renderer.setAnimationLoop(render);
    setStatus('📱 Move phone slowly over table...');
}

function showNoWebXR() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('no-webxr').style.display = 'flex';
}

// STEP 2: Render loop with hit-test
function render(timestamp, frame) {
    if (!frame) return;

    const referenceSpace = renderer.xr.getReferenceSpace();
    const session = renderer.xr.getSession();

    // Request hit-test source once
    if (!hitTestSourceRequested) {
        session.requestReferenceSpace('viewer').then(refSpace => {
            session.requestHitTestSource({ space: refSpace }).then(source => {
                hitTestSource = source;
            });
        });
        hitTestSourceRequested = true;
    }

    // STEP 2+3: Get hit-test results — detect surface, show reticle
    if (hitTestSource && !placed) {
        const hitTestResults = frame.getHitTestResults(hitTestSource);
        if (hitTestResults.length > 0) {
            const hit = hitTestResults[0];
            const pose = hit.getPose(referenceSpace);

            // Show reticle exactly on detected surface
            reticle.visible = true;
            dot.visible = true;
            reticle.matrix.fromArray(pose.transform.matrix);
            reticle.position.setFromMatrixPosition(reticle.matrix);
            dot.position.copy(reticle.position);
            dot.position.y += 0.001;

            setStatus('👆 Tap to place food on table');
        } else {
            reticle.visible = false;
            dot.visible = false;
            setStatus('📱 Move phone over table surface...');
        }
    }

    renderer.render(scene, camera);
}

// STEP 4: Tap to place — lock to world space
function placeFood() {
    if (!model || !reticle.visible || placed) return;
    placed = true;

    // Place model exactly where reticle is (on real table surface)
    model.position.copy(reticle.position);
    model.position.y += model.position.y; // keep bottom on surface
    model.visible = true;

    // Place shadows at same position
    const pos = reticle.position;
    shadowPlane.position.set(pos.x, pos.y + 0.001, pos.z);
    shadowPlane.visible = true;
    softShadow1.position.set(pos.x, pos.y + 0.001, pos.z);
    softShadow1.visible = true;
    softShadow2.position.set(pos.x, pos.y + 0.002, pos.z);
    softShadow2.visible = true;

    // Hide reticle
    reticle.visible = false;
    dot.visible = false;

    // Show controls
    document.getElementById('controls').style.display = 'flex';
    setStatus('✅ Food placed! Drag to rotate · Pinch to zoom');
    setTimeout(() => { document.getElementById('status').style.display = 'none'; }, 3000);
}

function resetPlacement() {
    placed = false;
    if(model) model.visible = false;
    shadowPlane.visible = false;
    softShadow1.visible = false;
    softShadow2.visible = false;
    rotY = 0;
    reticle.visible = true;
    dot.visible = true;
    document.getElementById('controls').style.display = 'none';
    setStatus('📱 Move phone over table surface...');
}

function exitAR() {
    if(xrSession) xrSession.end();
    window.history.back();
}

// Select event (tap in AR)
renderer.domElement.addEventListener('click', placeFood);
renderer.domElement.addEventListener('touchend', e => {
    if(!placed && reticle.visible) { placeFood(); return; }
});

// Touch rotate and zoom after placement
let lastX=null, lastPinch=null;
renderer.domElement.addEventListener('touchstart', e => {
    if(!placed) return;
    if(e.touches.length===1){ lastX=e.touches[0].clientX; lastPinch=null; }
    else if(e.touches.length===2){
        lastPinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
        lastX=null;
    }
}, {passive:true});

renderer.domElement.addEventListener('touchmove', e => {
    if(!model||!placed) return;
    if(e.touches.length===1&&lastX!==null){
        rotY += (e.touches[0].clientX-lastX)*0.01;
        model.rotation.y = rotY;
        lastX=e.touches[0].clientX;
    } else if(e.touches.length===2&&lastPinch!==null){
        const nd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
        currentScale = Math.max(0.5, Math.min(3, currentScale*(1+(nd-lastPinch)/lastPinch)));
        const box=new THREE.Box3().setFromObject(model);
        const size=box.getSize(new THREE.Vector3());
        model.scale.setScalar((0.25/Math.max(size.x,size.y,size.z))*currentScale);
        lastPinch=nd;
    }
}, {passive:true});

renderer.domElement.addEventListener('touchend',()=>{lastX=null;lastPinch=null;});

function setStatus(msg) {
    const el = document.getElementById('status');
    el.innerText = msg;
    el.style.display = 'block';
}

window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
});

// Start AR when model is loaded
document.getElementById('loading').style.display = 'flex';
// Wait for model then start AR
const checkModel = setInterval(() => {
    if(model !== null) {
        clearInterval(checkModel);
        startAR();
    }
}, 100);
</script>
</body>
</html>
