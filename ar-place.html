<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AR Food</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; overflow:hidden; font-family:-apple-system,sans-serif; }

        video {
            position:fixed; top:0; left:0;
            width:100vw; height:100vh;
            object-fit:cover; z-index:1;
        }
        canvas {
            position:fixed; top:0; left:0;
            width:100vw; height:100vh;
            z-index:2; background:transparent;
        }

        /* STEP 2: Scan surface instruction */
        #scan-msg {
            position:fixed; bottom:120px; left:50%;
            transform:translateX(-50%);
            z-index:99;
            background:rgba(0,0,0,0.7);
            color:white; font-size:14px; font-weight:bold;
            padding:12px 24px; border-radius:24px;
            text-align:center; white-space:nowrap;
            transition: opacity 0.5s;
        }

        /* STEP 3: Tap to place reticle */
        #reticle {
            position:fixed; bottom:35%;
            left:50%; transform:translateX(-50%);
            z-index:99; pointer-events:none;
            display:none; flex-direction:column;
            align-items:center; gap:10px;
        }
        #reticle-ring {
            width:72px; height:72px;
            border:2.5px solid #d4a574;
            border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            animation:pulse 1.5s ease-in-out infinite;
            box-shadow:0 0 20px rgba(212,165,116,0.5);
        }
        #reticle-dot { width:10px; height:10px; background:#d4a574; border-radius:50%; }
        #reticle-label {
            color:white; font-size:13px; font-weight:bold;
            background:rgba(0,0,0,0.65); padding:7px 18px; border-radius:20px;
        }
        @keyframes pulse {
            0%,100%{transform:scale(1);opacity:1;}
            50%{transform:scale(1.1);opacity:0.7;}
        }

        /* Back button */
        #back-btn {
            position:fixed; top:16px; left:16px; z-index:999;
            background:rgba(0,0,0,0.6); color:white; border:none;
            padding:8px 16px; border-radius:20px; font-size:14px; cursor:pointer;
        }

        /* STEP 12: Controls */
        #controls {
            position:fixed; bottom:20px; left:50%;
            transform:translateX(-50%);
            z-index:99; display:none;
            flex-direction:column; align-items:center; gap:8px;
        }
        #ctrl-hint { color:rgba(255,255,255,0.8); font-size:11px; }
        #ctrl-btns { display:flex; gap:10px; }
        .ctrl-btn {
            background:rgba(0,0,0,0.6); color:white;
            border:1.5px solid rgba(255,255,255,0.3);
            padding:8px 18px; border-radius:20px;
            font-size:12px; cursor:pointer;
        }

        /* Status toast */
        #toast {
            position:fixed; top:72px; left:50%;
            transform:translateX(-50%);
            z-index:999; background:rgba(44,24,16,0.9);
            color:#d4a574; padding:8px 20px;
            border-radius:20px; font-size:13px;
            display:none; white-space:nowrap;
        }

        /* Loading */
        #loading {
            position:fixed; inset:0; z-index:9999;
            background:#000;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            color:white; gap:14px; font-size:15px;
        }
        .spinner {
            width:44px; height:44px;
            border:3px solid rgba(255,255,255,0.2);
            border-top-color:#d4a574;
            border-radius:50%;
            animation:spin 1s linear infinite;
        }
        @keyframes spin{to{transform:rotate(360deg);}}
    </style>
</head>
<body>

<video id="cam" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<div id="loading">
    <div class="spinner"></div>
    <div id="load-txt">Starting camera...</div>
</div>

<!-- STEP 2: Scan surface instruction -->
<div id="scan-msg">📱 Move phone slowly to detect surface</div>

<!-- STEP 3: Tap to place reticle -->
<div id="reticle">
    <div id="reticle-ring"><div id="reticle-dot"></div></div>
    <div id="reticle-label">👆 TAP TO PLACE FOOD</div>
</div>

<button id="back-btn" onclick="window.history.back()">← Back</button>
<div id="toast"></div>

<!-- STEP 12: Controls -->
<div id="controls">
    <div id="ctrl-hint">☝️ Drag to rotate &nbsp;·&nbsp; 🤏 Pinch to zoom</div>
    <div id="ctrl-btns">
        <button class="ctrl-btn" onclick="resetPlace()">🔄 Replace</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/DRACOLoader.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const modelId = params.get('model') || 'pizza';
const modelSrc = {
    pizza:'./pizza.glb', burger:'./burger.glb',
    drink:'./drink.glb', pasta:'./pasta.glb', sushi:'./sushi.glb'
};
// STEP 6: Real world sizes in meters
const modelSizes = {
    pizza: 0.25,   // 25cm plate
    burger: 0.12,  // 12cm burger
    drink: 0.09,   // 9cm glass
    pasta: 0.22,   // 22cm plate
    sushi: 0.20    // 20cm platter
};

// STEP 4: placed = locked, never updated again
let placed = false;
let model = null;
let currentScale = 1.0;
let rotY = 0;
let surfaceDetected = false;

// Three.js
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
// STEP 9: Environment reflection tone mapping
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.01, 100);
camera.position.set(0, 0.8, 2.0);
camera.lookAt(0, 0, 0);

// STEP 8: Premium lighting setup
// Ambient light — soft fill
scene.add(new THREE.HemisphereLight(0xfff5e0, 0x443322, 1.0));
// Main key light — sunlight style
const keyLight = new THREE.DirectionalLight(0xFFD8B0, 1.8);
keyLight.position.set(-3, 6, 4);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 2048;
keyLight.shadow.mapSize.height = 2048;
keyLight.shadow.radius = 12;
keyLight.shadow.bias = -0.0005;
scene.add(keyLight);
// Fill light — removes harsh shadows
const fillLight = new THREE.DirectionalLight(0xffe8d5, 0.5);
fillLight.position.set(4, 3, -2);
scene.add(fillLight);
// Rim light — Netflix glow effect
const rimLight = new THREE.DirectionalLight(0xfff0e8, 0.6);
rimLight.position.set(0, 4, -6);
scene.add(rimLight);

// STEP 7: Shadow plane — soft shadow under model
const shadowPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(2, 2),
    new THREE.ShadowMaterial({ opacity:0.4 })
);
shadowPlane.rotation.x = -Math.PI/2;
shadowPlane.receiveShadow = true;
shadowPlane.visible = false;
scene.add(shadowPlane);

// Soft contact shadow (double layer)
const softShadow1 = new THREE.Mesh(
    new THREE.CircleGeometry(0.18, 32),
    new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:0.2, depthWrite:false })
);
softShadow1.rotation.x = -Math.PI/2;
softShadow1.position.y = 0.001;
softShadow1.visible = false;
scene.add(softShadow1);

const softShadow2 = new THREE.Mesh(
    new THREE.CircleGeometry(0.10, 32),
    new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:0.35, depthWrite:false })
);
softShadow2.rotation.x = -Math.PI/2;
softShadow2.position.y = 0.002;
softShadow2.visible = false;
scene.add(softShadow2);

// STEP 9: Steam particles
let steamParticles = null, steamAnimId = null;
function addSteam() {
    if (modelId === 'drink') return; // no steam for cold drink
    const count = 20;
    const pos = new Float32Array(count*3);
    const speeds = new Float32Array(count);
    const offsets = new Float32Array(count);
    for (let i=0; i<count; i++) {
        pos[i*3]   = (Math.random()-0.5)*0.15;
        pos[i*3+1] = Math.random()*0.3;
        pos[i*3+2] = (Math.random()-0.5)*0.15;
        speeds[i]  = 0.003 + Math.random()*0.005;
        offsets[i] = Math.random()*Math.PI*2;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({
        color:0xdddddd, size:0.04, transparent:true,
        opacity:0.3, depthWrite:false, blending:THREE.AdditiveBlending
    });
    steamParticles = new THREE.Points(geo, mat);
    steamParticles.position.y = 0.15;
    scene.add(steamParticles);
    let frame = 0;
    function animate() {
        steamAnimId = requestAnimationFrame(animate);
        if (!steamParticles) return;
        frame++;
        const p = steamParticles.geometry.attributes.position;
        for (let i=0; i<count; i++) {
            p.array[i*3+1] += speeds[i];
            p.array[i*3]   += Math.sin(frame*0.02+offsets[i])*0.001;
            if (p.array[i*3+1] > 0.5) {
                p.array[i*3]   = (Math.random()-0.5)*0.15;
                p.array[i*3+1] = 0;
                p.array[i*3+2] = (Math.random()-0.5)*0.15;
            }
        }
        p.needsUpdate = true;
        mat.opacity = 0.2 + Math.sin(frame*0.05)*0.1;
    }
    animate();
}

// Load model
const loader = new THREE.GLTFLoader();
const draco = new THREE.DRACOLoader();
draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
draco.setDecoderConfig({ type:'js' });
loader.setDRACOLoader(draco);

document.getElementById('load-txt').innerText = 'Loading model...';

loader.load(modelSrc[modelId], gltf => {
    model = gltf.scene;
    model.traverse(c => {
        if (c.isMesh) {
            c.castShadow = true;
            c.receiveShadow = true;
        }
    });

    // STEP 6: Set real-world scale
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const targetSize = modelSizes[modelId];
    const s = targetSize / maxDim;
    model.scale.setScalar(s);
    currentScale = s;

    // STEP 5: Fix pivot to bottom — no floating
    model.updateMatrixWorld(true);
    const box2 = new THREE.Box3().setFromObject(model);
    const center = box2.getCenter(new THREE.Vector3());
    model.position.set(-center.x, -box2.min.y, -center.z);

    // STEP 10: Keep rotation straight
    model.rotation.set(0, 0, 0);

    model.visible = false;
    scene.add(model);

    document.getElementById('loading').style.display = 'none';

    // STEP 1+2: Start surface detection simulation
    startSurfaceDetection();

}, null, err => {
    console.error(err);
    document.getElementById('load-txt').innerText = 'Failed to load model';
});

// Camera
async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }
        });
        document.getElementById('cam').srcObject = stream;
    } catch(e) {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video:true });
            document.getElementById('cam').srcObject = s;
        } catch(e2) { showToast('Camera error'); }
    }
}
startCamera();

// Animate
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();

// STEP 1+2: Simulate surface detection
function startSurfaceDetection() {
    document.getElementById('scan-msg').style.display = 'block';
    // Simulate surface detection after 2 seconds of scanning
    setTimeout(() => {
        surfaceDetected = true;
        document.getElementById('scan-msg').style.display = 'none';
        document.getElementById('reticle').style.display = 'flex';
        showToast('✅ Surface detected! Tap to place');
    }, 2000);
}

// STEP 3+4: Place and LOCK model on tap
function placeModel() {
    if (!model || !surfaceDetected || placed) return;

    // STEP 4: Lock — placed = true, never update position again
    placed = true;

    model.visible = true;
    shadowPlane.visible = true;
    softShadow1.visible = true;
    softShadow2.visible = true;

    // STEP 7: Position shadows exactly under model
    shadowPlane.position.set(0, 0, 0);
    softShadow1.position.set(0, 0.001, 0);
    softShadow2.position.set(0, 0.002, 0);

    // STEP 9: Add steam
    addSteam();

    document.getElementById('reticle').style.display = 'none';
    document.getElementById('controls').style.display = 'flex';
    showToast('🍽️ Placed! Drag to rotate · Pinch to zoom');
}

function resetPlace() {
    placed = false;
    surfaceDetected = false;
    if (model) model.visible = false;
    shadowPlane.visible = false;
    softShadow1.visible = false;
    softShadow2.visible = false;
    if (steamParticles) { scene.remove(steamParticles); steamParticles = null; }
    if (steamAnimId) { cancelAnimationFrame(steamAnimId); steamAnimId = null; }
    rotY = 0;
    document.getElementById('reticle').style.display = 'none';
    document.getElementById('controls').style.display = 'none';
    startSurfaceDetection();
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.style.display = 'block';
    clearTimeout(t._t);
    t._t = setTimeout(() => { t.style.display = 'none'; }, 3000);
}

// STEP 3: Tap to place
canvas.addEventListener('click', () => { if (!placed) placeModel(); });

// STEP 12: Touch controls — rotate and zoom
let lastX = null, lastPinch = null;

canvas.addEventListener('touchstart', e => {
    if (!placed) { placeModel(); return; }
    if (e.touches.length === 1) { lastX = e.touches[0].clientX; lastPinch = null; }
    else if (e.touches.length === 2) {
        lastPinch = Math.hypot(
            e.touches[0].clientX-e.touches[1].clientX,
            e.touches[0].clientY-e.touches[1].clientY
        );
        lastX = null;
    }
}, { passive:true });

canvas.addEventListener('touchmove', e => {
    if (!model || !placed) return;

    if (e.touches.length === 1 && lastX !== null) {
        // STEP 12: Drag to rotate — only Y axis (plate stays flat)
        const dx = e.touches[0].clientX - lastX;
        rotY += dx * 0.01;
        model.rotation.y = rotY;
        lastX = e.touches[0].clientX;
    } else if (e.touches.length === 2 && lastPinch !== null) {
        // STEP 12: Pinch to resize
        const nd = Math.hypot(
            e.touches[0].clientX-e.touches[1].clientX,
            e.touches[0].clientY-e.touches[1].clientY
        );
        const delta = (nd - lastPinch) / lastPinch;
        currentScale = Math.max(0.3, Math.min(5, currentScale * (1 + delta * 0.5)));
        model.scale.setScalar(currentScale);

        // STEP 7: Scale shadow with model
        const s = currentScale / modelSizes[modelId];
        softShadow1.scale.setScalar(s);
        softShadow2.scale.setScalar(s);
        lastPinch = nd;
    }
}, { passive:true });

canvas.addEventListener('touchend', () => { lastX = null; lastPinch = null; });

// Mouse controls for laptop testing
canvas.addEventListener('mousedown', e => { if (placed) { lastX = e.clientX; } });
canvas.addEventListener('mousemove', e => {
    if (!model || !placed || lastX === null) return;
    rotY += (e.clientX - lastX) * 0.01;
    model.rotation.y = rotY;
    lastX = e.clientX;
});
canvas.addEventListener('mouseup', () => { lastX = null; });
canvas.addEventListener('wheel', e => {
    if (!model || !placed) return;
    currentScale = Math.max(0.3, Math.min(5, currentScale - e.deltaY * 0.001));
    model.scale.setScalar(currentScale);
});

window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});
</script>
</body>
</html>
