<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>AR View</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; background:#000; font-family:-apple-system,sans-serif; }

        #viewer-ar {
            position:fixed; inset:0; z-index:1;
            display:block;
        }

        #viewer-ar video {
            position:fixed!important; top:0!important; left:0!important;
            width:100vw!important; height:100vh!important;
            object-fit:cover!important; z-index:1!important; display:block!important;
        }

        #viewer-ar canvas {
            position:fixed!important; top:0!important; left:0!important;
            width:100vw!important; height:100vh!important;
            z-index:2!important; background:transparent!important;
        }

        /* UI */
        #top-bar {
            position:fixed; top:0; left:0; right:0; z-index:9999;
            display:flex; justify-content:space-between; align-items:center;
            padding:14px 16px;
            background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);
        }

        #back-btn {
            background:rgba(0,0,0,0.6); color:white; border:none;
            padding:8px 16px; border-radius:20px; font-size:14px; cursor:pointer;
        }

        #food-title { color:white; font-size:16px; font-weight:bold; text-shadow:0 1px 4px rgba(0,0,0,0.5); }

        /* Scan overlay */
        #scan-overlay {
            position:fixed; inset:0; z-index:9998;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:20px;
            pointer-events:none;
            transition:opacity 0.5s;
        }

        #scan-overlay.hidden { opacity:0; pointer-events:none; }

        #scan-top-text {
            color:white; font-size:15px; font-weight:bold;
            background:rgba(0,0,0,0.6); padding:10px 20px; border-radius:20px;
        }

        #scan-box {
            width:260px; height:180px; position:relative; overflow:hidden;
        }

        .scan-corner {
            position:absolute; width:30px; height:30px;
            border-color:#d4a574; border-style:solid;
        }
        .scan-corner.tl { top:0; left:0; border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
        .scan-corner.tr { top:0; right:0; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
        .scan-corner.bl { bottom:0; left:0; border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
        .scan-corner.br { bottom:0; right:0; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }

        #scan-line {
            position:absolute; left:0; right:0; height:2px;
            background:linear-gradient(90deg,transparent,#d4a574,transparent);
            animation:scanMove 2s linear infinite;
            box-shadow:0 0 8px #d4a574;
        }
        @keyframes scanMove { 0%{top:0} 50%{top:calc(100% - 2px)} 100%{top:0} }

        #scan-tips {
            display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
        }
        .scan-tip {
            background:rgba(0,0,0,0.5); color:white;
            font-size:11px; padding:5px 12px; border-radius:12px;
        }

        /* Detected popup */
        #ar-detected {
            position:fixed; top:80px; left:50%; transform:translateX(-50%);
            z-index:9999; background:linear-gradient(135deg,#2c1810,#4a2c1a);
            color:#d4a574; padding:14px 28px; border-radius:24px;
            font-size:16px; font-weight:bold; display:none;
            flex-direction:column; align-items:center; gap:4px;
            box-shadow:0 4px 24px rgba(0,0,0,0.4);
        }

        /* Free mode controls */
        #free-controls {
            position:fixed; bottom:0; left:0; right:0; z-index:9999;
            background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);
            padding:16px; display:none;
            flex-direction:column; align-items:center; gap:10px;
        }

        #hint-bar {
            color:rgba(255,255,255,0.8); font-size:12px; text-align:center;
        }



        #scan-again-btn {
            background:rgba(212,165,116,0.9); color:white; border:none;
            padding:10px 24px; border-radius:20px;
            font-size:14px; font-weight:bold; cursor:pointer;
        }
    </style>
</head>
<body>

<div id="top-bar">
    <button id="back-btn" onclick="window.history.back()">← Back</button>
    <div id="food-title">Loading...</div>
    <div style="width:70px"></div>
</div>

<!-- MindAR Scene -->
<div id="viewer-ar">
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiError: no; uiScanning: no"
        color-space="sRGB"
        renderer="colorManagement: true; physicallyCorrectLights: true; exposure: 1.0"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        loading-screen="enabled: false">
        <a-assets timeout="120000">
            <a-asset-item id="pizzaModel"  src="./pizza.glb"></a-asset-item>
            <a-asset-item id="burgerModel" src="./burger.glb"></a-asset-item>
            <a-asset-item id="drinkModel"  src="./drink.glb"></a-asset-item>
        </a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <!-- Natural restaurant lighting -->
        <a-light type="ambient" color="#fff8f0" intensity="1.2"></a-light>
        <a-light type="directional" color="#ffffff" intensity="1.8" position="3 8 5" cast-shadow="true"></a-light>
        <a-light type="directional" color="#ffe8d0" intensity="0.8" position="-4 4 -3"></a-light>
        <a-light type="directional" color="#ffd0a0" intensity="0.6" position="0 3 -5"></a-light>
        <a-light type="point" color="#ffcc88" intensity="0.8" position="0 2 2" distance="8"></a-light>
        <a-entity mindar-image-target="targetIndex: 0">
            <!-- Shadow plane on ground level -->
            <a-circle radius="0.3" rotation="-90 0 0" position="0 0.001 0"
                material="color:#000000; opacity:0.25; transparent:true; shader:flat">
            </a-circle>
            <a-gltf-model id="ar-pizza"  src="#pizzaModel"  position="0 0 0" scale="1 1 1" rotation="-90 0 0" visible="true"></a-gltf-model>
            <a-gltf-model id="ar-burger" src="#burgerModel" position="0 0 0" scale="1 1 1" rotation="-90 0 0" visible="true"></a-gltf-model>
            <a-gltf-model id="ar-drink"  src="#drinkModel"  position="0 0 0" scale="1 1 1" rotation="-90 0 0" visible="true"></a-gltf-model>
        </a-entity>
    </a-scene>
</div>

<!-- Scan overlay - minimal, no text -->
<div id="scan-overlay">
    <div id="scan-box">
        <div class="scan-corner tl"></div>
        <div class="scan-corner tr"></div>
        <div class="scan-corner bl"></div>
        <div class="scan-corner br"></div>
        <div id="scan-line"></div>
    </div>
</div>

<!-- Detected popup -->
<div id="ar-detected">
    <div style="font-size:28px">✅</div>
    <div>Image Detected!</div>
</div>

<!-- Free placement controls - empty -->
<div id="free-controls"></div>

<script>
const params = new URLSearchParams(window.location.search);
const modelId = params.get('model') || 'pizza';
const modelNames = { pizza:'Margherita Pizza 🍕', burger:'Classic Burger 🍔', drink:'Fresh Lemonade 🥤' };
const modelScales = { pizza:2.5, burger:0.4, drink:1.2 };
const modelIds = { pizza:'ar-pizza', burger:'ar-burger', drink:'ar-drink' };

document.getElementById('food-title').innerText = modelNames[modelId];

let arScale = modelScales[modelId];
let sizePercent = 100;
let rotY = 0, rotX = 0;
let detected = false;

// Fix video white screen
function fixVideo() {
    document.querySelectorAll('video').forEach(v => {
        v.style.cssText = 'position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;object-fit:cover!important;z-index:1!important;display:block!important;';
    });
    document.querySelectorAll('#viewer-ar canvas').forEach(c => {
        c.style.cssText = 'position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;z-index:2!important;background:transparent!important;';
    });
}
setInterval(() => { if(document.getElementById('viewer-ar').style.display !== 'none') fixVideo(); }, 500);

// Hide other models show only selected
Object.keys(modelIds).forEach(key => {
    const el = document.getElementById(modelIds[key]);
    if (el) el.setAttribute('scale', '0 0 0');
});

// Set correct model scale
setTimeout(() => {
    const el = document.getElementById(modelIds[modelId]);
    if (el) {
        el.setAttribute('scale', `${arScale} ${arScale} ${arScale}`);
        el.setAttribute('rotation', '-90 0 0');
    }
}, 500);

// MindAR detection
setTimeout(() => {
    const target = document.querySelector('[mindar-image-target]');
    if (target) {
        target.addEventListener('targetFound', onDetected);
        target.addEventListener('targetLost', onLost);
    }
}, 1000);

function onDetected() {
    if (detected) return;
    detected = true;

    // Keep model on ground level - y stays at 0
    const el = document.getElementById(modelIds[modelId]);
    if (el) el.setAttribute('position', '0 0 0');

    // Hide scan overlay
    document.getElementById('scan-overlay').classList.add('hidden');

    // Show detected popup
    const det = document.getElementById('ar-detected');
    det.style.display = 'flex';
    setTimeout(() => { det.style.display = 'none'; }, 2000);

    // Show free controls
    document.getElementById('free-controls').style.display = 'flex';

    // No vibration


}

function onLost() {
    if (!detected) {
        document.getElementById('scan-overlay').classList.remove('hidden');
    }
}

function scanAgain() {
    detected = false;
    document.getElementById('scan-overlay').classList.remove('hidden');
    document.getElementById('free-controls').style.display = 'none';
}



// Touch controls - rotate and zoom
let lastX = null, lastY = null, lastPinch = null;

document.addEventListener('touchstart', e => {
    if (e.target.closest('#free-controls') || e.target.closest('#top-bar')) return;
    if (e.touches.length === 1) {
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
        lastPinch = null;
    } else if (e.touches.length === 2) {
        lastPinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        lastX = null; lastY = null;
    }
}, { passive: true });

document.addEventListener('touchmove', e => {
    if (e.target.closest('#free-controls') || e.target.closest('#top-bar')) return;
    const el = document.getElementById(modelIds[modelId]);
    if (!el) return;

    if (e.touches.length === 1 && lastX !== null) {
        // Only Y rotation (spin around) - keeps food on ground
        const dx = e.touches[0].clientX - lastX;
        rotY += dx * 1.0;
        // Lock position to ground - only spin horizontally
        el.setAttribute('rotation', `-90 ${rotY} 0`);
        // Keep position locked on ground level
        el.setAttribute('position', '0 0 0');
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
    } else if (e.touches.length === 2 && lastPinch !== null) {
        // Pinch to zoom
        const nd = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        const delta = (nd - lastPinch) / lastPinch;
        arScale = Math.max(0.01, Math.min(20, arScale * (1 + delta * 0.8)));
        el.setAttribute('scale', `${arScale} ${arScale} ${arScale}`);
        // Keep position locked on ground
        el.setAttribute('position', '0 0 0');
        lastPinch = nd;
    }
}, { passive: true });

document.addEventListener('touchend', () => { lastX = null; lastY = null; lastPinch = null; });
</script>
</body>
</html>
